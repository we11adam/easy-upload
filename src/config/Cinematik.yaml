url: https://cinematik.net
host: cinematik.net
siteType: UNIT3D
icon: data:image/png;base64,
asSource: true
asTarget: true
uploadPath: /torrents/create?category_id=1
torrentDownloadLinkSelector: 'a[href*="/torrents/download/"]'
seedDomSelector: '.torrent__buttons+.panelV2'
needDoubanInfo: true
search:
  path: /torrents
  replaceKey: ['tt', '']
  params:
    name: '{name}'
    imdbId: '{imdb}'
    sortField: size
name:
  selector: '#title'
description:
  selector: '#bbcode-description'
imdb:
  selector: '#autoimdb'
tmdb:
  selector: '#auto_tmdb_movie, #auto_tmdb_tv'
mediaInfo:
  selector: 'textarea[name="mediainfo"]'
anonymous:
  selector: '#anon'
torrent:
  selector: '#torrent'
category:
  selector: '#autocat'
  map:
    movie: '1'
    tv: '2'
    tvPack: '2'
videoType:
  selector: '#autotype'
  map:
    uhdbluray: '1'
    bluray: '1'
    remux: '2'
    encode: '3'
    web: '4'
    hdtv: '6'
    dvd: '1'
    dvdrip: '3'
    other: ''
resolution:
  selector: '#autores'
  map:
    4320p: '1'
    2160p: '2'
    1080p: '3'
    1080i: '4'
    720p: '5'
    576p: '6'
    480p: '8'
